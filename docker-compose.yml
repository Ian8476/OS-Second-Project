name: mediaintel

# =========================================================================
# Stack distribuido del Proyecto 2 - Sistemas Operativos (IC-4300)
# Servicios: API Gateway, RabbitMQ, Celery workers (4), PostgreSQL,
#            Redis, MinIO, Dashboard, Flower, Prometheus, Grafana
# =========================================================================

x-common-env: &common-env
  APP_ENV: ${APP_ENV:-development}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  DATABASE_URL: ${DATABASE_URL}
  DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
  REDIS_URL: ${REDIS_URL}
  REDIS_PUBSUB_URL: ${REDIS_PUBSUB_URL}
  MINIO_HOST: ${MINIO_HOST}
  MINIO_PORT: ${MINIO_PORT}
  MINIO_ROOT_USER: ${MINIO_ROOT_USER}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
  MINIO_BUCKET: ${MINIO_BUCKET}
  MINIO_USE_SSL: ${MINIO_USE_SSL}
  TASK_MAX_RETRIES: ${TASK_MAX_RETRIES}
  TASK_RETRY_BACKOFF_BASE: ${TASK_RETRY_BACKOFF_BASE}
  TASK_SOFT_TIME_LIMIT: ${TASK_SOFT_TIME_LIMIT}
  TASK_HARD_TIME_LIMIT: ${TASK_HARD_TIME_LIMIT}

x-worker-common: &worker-common
  restart: unless-stopped
  depends_on:
    rabbitmq:
      condition: service_healthy
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    minio:
      condition: service_healthy
  networks:
    - mediaintel-net

services:
  # ---------------- INFRASTRUCTURE ----------------
  postgres:
    image: postgres:16-alpine
    container_name: mediaintel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mediaintel-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: mediaintel-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - mediaintel-net

  redis:
    image: redis:7-alpine
    container_name: mediaintel-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mediaintel-net

  minio:
    image: minio/minio:latest
    container_name: mediaintel-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mediaintel-net

  minio-init:
    image: minio/mc:latest
    container_name: mediaintel-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/${MINIO_BUCKET} || true &&
      mc encrypt set sse-s3 local/${MINIO_BUCKET} || true &&
      echo 'MinIO bucket configured';
      "
    networks:
      - mediaintel-net

  # ---------------- APPLICATION ----------------
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: mediaintel-api
    restart: unless-stopped
    environment:
      <<: *common-env
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - mediaintel-net

  worker_text:
    <<: *worker-common
    build:
      context: .
      dockerfile: services/worker_text/Dockerfile
    container_name: mediaintel-worker-text
    environment:
      <<: *common-env
      WORKER_QUEUE: queue.text
      WORKER_CONCURRENCY: ${WORKER_TEXT_CONCURRENCY:-4}

  worker_audio:
    <<: *worker-common
    build:
      context: .
      dockerfile: services/worker_audio/Dockerfile
    container_name: mediaintel-worker-audio
    environment:
      <<: *common-env
      WORKER_QUEUE: queue.audio
      WORKER_CONCURRENCY: ${WORKER_AUDIO_CONCURRENCY:-1}
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-tiny}
    volumes:
      - whisper-cache:/root/.cache/huggingface

  worker_image:
    <<: *worker-common
    build:
      context: .
      dockerfile: services/worker_image/Dockerfile
    container_name: mediaintel-worker-image
    environment:
      <<: *common-env
      WORKER_QUEUE: queue.image
      WORKER_CONCURRENCY: ${WORKER_IMAGE_CONCURRENCY:-2}
      YOLO_MODEL: ${YOLO_MODEL:-yolov8n.pt}
    volumes:
      - yolo-cache:/root/.cache/ultralytics

  worker_aggregator:
    <<: *worker-common
    build:
      context: .
      dockerfile: services/worker_aggregator/Dockerfile
    container_name: mediaintel-worker-aggregator
    environment:
      <<: *common-env
      WORKER_QUEUE: queue.aggregate
      WORKER_CONCURRENCY: ${WORKER_AGGREGATOR_CONCURRENCY:-2}

  # ---------------- DASHBOARD ----------------
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL}
    container_name: mediaintel-dashboard
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api
    networks:
      - mediaintel-net

  # ---------------- MONITORING ----------------
  flower:
    image: mher/flower:2.0
    container_name: mediaintel-flower
    restart: unless-stopped
    command:
      [
        "celery",
        "--broker=${CELERY_BROKER_URL}",
        "flower",
        "--port=5555",
        "--persistent=True",
        "--db=/data/flower.db",
      ]
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
    ports:
      - "5555:5555"
    volumes:
      - flower-data:/data
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - mediaintel-net

  prometheus:
    image: prom/prometheus:latest
    container_name: mediaintel-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - mediaintel-net

  grafana:
    image: grafana/grafana:latest
    container_name: mediaintel-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - mediaintel-net

volumes:
  postgres-data:
  rabbitmq-data:
  redis-data:
  minio-data:
  prometheus-data:
  grafana-data:
  flower-data:
  whisper-cache:
  yolo-cache:

networks:
  mediaintel-net:
    driver: bridge
